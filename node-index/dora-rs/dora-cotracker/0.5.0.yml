manifest:
  apiVersion: 1
  name: dora-cotracker
  namespace: dora-rs
  description: Real-time point tracking using Facebook's CoTracker model. Consumes an RGB image stream plus query points (raw points or 2D bounding boxes) and emits the tracked point positions and an annotated visualization frame.
  categories:
  - ml-inference
  - transform
  keywords:
  - tracking
  - cotracker
  - points
  - vision
  runtime: python
  entrypoint: dora-cotracker
  build: pip install .
  dora: '>=0.3.9'
  inputs:
    boxes2d:
      required: false
      description: 2D bounding boxes (StructArray with `bbox`/`labels`, or a flat array reshaped to (-1, 4)). Sample points are derived along each box and used as query points. An empty value clears the current query points.
    image:
      required: true
      description: RGB video frame as a flattened uint8 Arrow array. Metadata must include `width` and `height`; reshaped to (height, width, 3).
    points:
      required: false
      description: Query points to track, as a flattened float array of x,y coordinates (reshaped to (-1, 2)). New points are accepted only after the previous batch has been consumed by the tracker.
  outputs:
    points:
      description: 'Visible tracked point positions as a flattened float32 Arrow array. Metadata: `num_points`, `dtype`, `shape` (N, 2), `width`, `height`.'
    tracked_image:
      description: The input frame annotated with tracked points, as a flattened Arrow array carrying the input image metadata.
  env:
    INTERACTIVE_MODE:
      type: bool
      default: false
      description: When true, opens an OpenCV window showing the feed and lets you left-click to add tracking points. Requires a display; leave false for headless runs.
  example: |-
    - id: camera
      path: opencv-video-capture
      inputs:
        tick: dora/timer/millis/100
      outputs:
        - image
      env:
        CAPTURE_PATH: "0"
        ENCODING: "rgb8"
        IMAGE_WIDTH: "640"
        IMAGE_HEIGHT: "480"
    - id: tracker
      hub: dora-cotracker@^0.5
      inputs:
        image: camera/image
      outputs:
        - points
        - tracked_image
