manifest:
  apiVersion: 1
  name: terminal-print
  namespace: dora-rs
  description: Print received inputs to the terminal — a debug sink that pretty-prints UTF-8 strings and debug-dumps any other Arrow type.
  categories:
  - debug
  keywords:
  - debug
  - print
  - terminal
  - sink
  runtime: rust
  entrypoint: target/release/terminal-print
  build: cargo build --release --target-dir target
  dora: '>=0.3.9'
  inputs:
    data:
      required: false
      description: The stream to print. Any Arrow value; UTF-8 is shown as text, anything else is debug-dumped.
  example: |-
    - id: terminal-print
      hub: terminal-print@^0.5
      inputs:
        data: some-node/output
source:
