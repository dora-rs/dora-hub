manifest:
  apiVersion: 1
  name: dora-rav1e
  namespace: dora-rs
  description: AV1 video encoder built on rav1e. Takes raw image frames (bgr8, rgb8, yuv420, mono16/z16) and encodes them into AV1 or AVIF byte streams.
  categories:
  - transform
  keywords:
  - av1
  - avif
  - rav1e
  - video
  - encoder
  - image
  - codec
  runtime: rust
  entrypoint: target/release/dora-rav1e
  build: cargo build --release --target-dir target
  dora: '>=0.3.9'
  inputs:
    image:
      description: Raw image frame to encode. Arrow uint8 (bgr8, rgb8, yuv420) or uint16 (mono16, z16). The frame pixel format is read from the input metadata `encoding` parameter (defaults to `bgr8`); `width`/`height` metadata parameters override the IMAGE_WIDTH/IMAGE_HEIGHT env defaults.
  outputs:
    image:
      description: 'Encoded frame as Arrow uint8 bytes. Output metadata carries `encoding` (`av1` or `avif`), `primitive: image`, plus `width`/`height` for AV1 output. The encoder re-emits under the same id it received the input on.'
  env:
    ENCODING:
      type: string
      default: av1
      description: Output container/codec. `av1` for raw AV1 packets, `avif` for AVIF-wrapped output.
    FILL_ZEROS:
      type: bool
      default: true
      description: For mono16/z16 depth frames, fill zero pixels toward the row center before encoding. Set to `false` to disable.
    IMAGE_HEIGHT:
      type: int
      default: 480
      description: Default frame height in pixels, used when no `height` input metadata is present.
    IMAGE_WIDTH:
      type: int
      default: 640
      description: Default frame width in pixels, used when no `width` input metadata is present.
    RAV1E_SPEED:
      type: int
      default: 10
      description: rav1e speed preset (0 = slowest/best quality, 10 = fastest).
  example: |-
    - id: dora-rav1e
      hub: dora-rav1e@^0.3
      inputs:
        image: camera/image
      env:
        ENCODING: avif
        IMAGE_WIDTH: 640
        IMAGE_HEIGHT: 480
