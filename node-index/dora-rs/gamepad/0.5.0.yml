manifest:
  apiVersion: 1
  name: gamepad
  namespace: dora-rs
  description: Read a connected gamepad/joystick (via pygame) and emit robot velocity commands plus the raw controller state. Defaults target the Logitech F710.
  categories:
  - sensor
  - robot
  keywords:
  - gamepad
  - joystick
  - controller
  - teleop
  - cmd_vel
  - pygame
  runtime: python
  entrypoint: gamepad
  build: pip install .
  dora: '>=0.3.9'
  inputs:
    tick:
      required: true
      description: Poll trigger. Each event reads the current gamepad state and emits outputs.
  outputs:
    cmd_vel:
      description: 6-element float64 velocity [linear_x, linear_y, linear_z, angular_x, angular_y, angular_z]. Only sent when any component is non-zero; a zero vector is sent once on shutdown.
    raw_control:
      description: Full controller state as a single JSON string (axes, buttons, hats, and the axis/button name mapping). Sent alongside each non-zero cmd_vel.
  env:
    JOYSTICK_DEADZONE:
      default: 0.2
      description: Absolute axis magnitude below which stick input is treated as zero.
    MAX_ANGULAR_SPEED:
      default: 0.8
      description: Scale applied to angular velocity components (rad/s).
    MAX_LINEAR_SPEED:
      default: 0.05
      description: Scale applied to linear velocity components (m/s).
  example: |-
    - id: gamepad
      hub: gamepad@^0.5
      inputs:
        tick: dora/timer/millis/10
