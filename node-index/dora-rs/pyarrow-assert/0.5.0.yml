manifest:
  apiVersion: 1
  name: pyarrow-assert
  namespace: dora-rs
  description: Test sink that asserts every received input equals a fixed expected pyarrow value.
  categories:
  - debug
  keywords:
  - assert
  - test
  - pyarrow
  - arrow
  - sink
  runtime: python
  entrypoint: pyarrow-assert
  build: pip install .
  dora: '>=0.3.9'
  inputs:
    data:
      description: The stream to assert. Every received value must equal the expected DATA.
  env:
    DATA:
      default: ''
      description: Expected value, parsed with ast.literal_eval then wrapped in a pyarrow array. Scalars (str/int/float) become a 1-element array; lists become an array of their elements. Unparsable text is kept as a string.
  example: |-
    - id: sender
      hub: pyarrow-sender@^0.5
      env:
        DATA: "[1, 2, 3]"
      outputs:
        - data
    - id: pyarrow-assert
      hub: pyarrow-assert@^0.5
      inputs:
        data: sender/data
      env:
        DATA: "[1, 2, 3]"
source:
