apiVersion: 1
name: dora-ugv
namespace: dora-rs
description: Dora node for controlling an Agilex UGV (Hunter) over CAN — sends linear/angular motion commands and emits the robot's measured velocity.
categories:
  - actuator
  - robot
  - sensor
keywords:
  - agilex
  - ugv
  - hunter
  - mobile-robot
  - can
runtime: python
entrypoint: dora-ugv
build: pip install .
dora: ">=0.3.9"
platforms: []

inputs:
  action:
    description: Motion command as a 2-element array [linear_velocity, angular_velocity]; forwarded to the robot via set_motion_command.
  tick:
    description: Any non-action input triggers a robot-state read and publishes the current velocity on the velocity output.

outputs:
  velocity:
    description: Measured robot velocity as a 2-element array [linear_velocity, angular_velocity], read from the robot state on each tick.

env:
  CAN_BUS:
    description: CAN bus interface the robot is connected on.
    default: "can0"

example: |
  - id: dora-ugv
    hub: dora-ugv@^0.5
    inputs:
      action: command-source/action
      tick: dora/timer/millis/100
    env:
      CAN_BUS: can0
    outputs:
      - velocity
