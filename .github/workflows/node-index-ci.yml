name: node-index CI

# Path-scoped to the catalog: this never runs for, and never gates, the
# human-reviewed `node-hub/` source path (Hub spec §7.5 / P2.3).
on:
  pull_request:
    paths:
      - 'node-index/**'
      - 'index-ci/**'
      - '.github/workflows/node-index-ci.yml'

permissions:
  contents: read

jobs:
  index-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: index-ci
      - name: Unit + integration tests
        run: cargo test -p dora-index-ci
      - name: Build the gate
        run: cargo build -p dora-index-ci --release
      - name: Validate catalog entries (schema + paths + pins)
        run: ./target/release/dora-index-ci validate
      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      - name: Append-only enforcement (§7.5)
        run: ./target/release/dora-index-ci append-only --base "origin/${{ github.base_ref }}"
      - name: Namespace governance (§7.4 reserved + confusable)
        run: ./target/release/dora-index-ci namespace --base "origin/${{ github.base_ref }}"
      - name: Namespace-identity binding (§7.4 — author owns the claimed namespace)
        env:
          # public-API reads; lifts the unauthenticated rate limit
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./target/release/dora-index-ci identity \
            --author "${{ github.event.pull_request.user.login }}" \
            --base "origin/${{ github.base_ref }}"
