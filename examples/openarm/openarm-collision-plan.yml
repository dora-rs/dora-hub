nodes:
  # --- Camera ---
  - id: camera
    build: pip install -e ../../node-hub/dora-pyrealsense
    path: dora-pyrealsense
    inputs:
      tick: dora/timer/millis/100  # 10Hz
    outputs:
      - image
      - depth
    env:
      DEVICE_SERIAL: ""
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      ENCODING: "rgb8"

  # --- Motion Planner ---
  - id: motion_planner
    build: pip install -e ../../node-hub/dora-motion-planner
    path: dora-motion-planner
    inputs:
      depth:
        source: camera/depth
        queue_size: 1
      joint_state: arm/joint_state
      target_pose: terminal/text
    outputs:
      - joint_trajectory
    env:
      URDF_PATH: "../openarm/openarm_v10.urdf"
      END_EFFECTOR_LINK: "openarm_left_hand_tcp"
      CAMERA_TRANSFORM: "-0.23 0.71 0.3 90 -45 0"
      DOWNSAMPLE_STRIDE: "8"
      SAFETY_MARGIN: "0.02"
      NUM_WAYPOINTS: "200"
      NUM_SEEDS: "8"
      MAX_ITERS: "500"
      DEVICE: "cuda"

  # --- Trajectory Player ---
  - id: player
    build: pip install dora-rs numpy pyarrow
    path: trajectory_player.py
    inputs:
      joint_trajectory: motion_planner/joint_trajectory
      tick: dora/timer/millis/100  # 10Hz playback
    outputs:
      - joint_command

  # --- Arm Driver ---
  - id: arm
    build: pip install -e ../../node-hub/dora-openarm
    path: dora-openarm
    inputs:
      tick: dora/timer/millis/100
      joint_command:
        source: player/joint_command
        queue_size: 1
    outputs:
      - joint_state
    env:
      CAN_INTERFACE: "can2"
      ARM_SIDE: "left"
      KP: "30"
      KD: "1"
      AUTO_ENABLE: "true"

  # --- Terminal input (for sending target poses) ---
  - id: terminal
    build: pip install -e ../../node-hub/terminal-input
    path: terminal-input
    outputs:
      - text
