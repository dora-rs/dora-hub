nodes:
  - id: NODE_ID
    build: cargo build -p dora-openai-websocket --release
    path: ../../target/release/dora-openai-websocket
    inputs:
      audio: tts/audio
      transcript: stt/text
      text: llm/text
      speech_started: dora-vad/timestamp_start
      speech_stopped: dora-vad/timestamp_end
    outputs:
      - audio
      - text
      - function_call_output
      - response.create
      - system_prompt
      - tools

  - id: dora-vad
    build: pip install -e ../../node-hub/dora-vad
    path: dora-vad
    inputs:
      audio:
        source: NODE_ID/audio
        queue_size: 10
    outputs:
      - audio
      - timestamp_start
      - timestamp_end
    env:
      MIN_SPEECH_DURATION_MS: 500
      MIN_SILENCE_DURATION_MS: 500
      THRESHOLD: 0.6

  - id: stt
    build: pip install -e ../../node-hub/dora-funasr
    path: dora-funasr
    inputs:
      audio:
        source: dora-vad/audio
        queue_size: 10
    outputs:
      - text
      - word
      - speech_started
    env:
      LANGUAGE: en

  - id: llm
    build: pip install -e ../../node-hub/dora-qwen3
    path: dora-qwen3
    inputs:
      text: stt/text
      text_to_audio: NODE_ID/text
      text_tool_response: NODE_ID/function_call_output
      response.create: NODE_ID/response.create
      system_prompt: NODE_ID/system_prompt
      tools: NODE_ID/tools
    outputs:
      - text

  - id: tts
    build: pip install -e ../../node-hub/dora-kokoro-tts
    path: dora-kokoro-tts
    inputs:
      text:
        source: llm/text
        queue_size: 10
    outputs:
      - audio
    env:
      VOICE: am_fenrir
