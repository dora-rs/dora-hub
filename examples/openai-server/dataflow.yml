nodes:
  - id: dora-openai-server
    build: pip install -e ../../node-hub/dora-openai-server
    path: dora-openai-server
    outputs:
      - v1_chat_completions
    inputs:
      v1_chat_completions: dora-echo/echo

  - id: dora-echo
    build: pip install -e ../../node-hub/dora-echo
    path: dora-echo
    inputs:
      echo: dora-openai-server/v1_chat_completions
    outputs:
      - echo
