nodes:
  - id: camera
    build: pip install -e ../../node-hub/dora-pyrealsense
    path: dora-pyrealsense
    inputs:
      tick: dora/timer/millis/500
    outputs:
      - image
      - depth
    env:
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      ENCODING: "rgb8"

  - id: map-anything
    build: pip install -e ../../node-hub/dora-map-anything
    path: dora-map-anything
    inputs:
      image: camera/image
      depth: camera/depth
      trigger: trigger/data
    outputs:
      - glb_path
    env:
      NUM_FRAMES: "8"
      OUTPUT_DIR: "./output"
      AS_MESH: "true"

  - id: trigger
    build: pip install -e ../../node-hub/terminal-input
    path: terminal-input
    outputs:
      - data

  - id: viewer
    path: glb_server.py
    inputs:
      glb_path: map-anything/glb_path
    env:
      SERVER_PORT: "8080"
      OUTPUT_DIR: "./output"
