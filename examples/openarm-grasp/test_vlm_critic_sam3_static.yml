nodes:
  # --- Static image sender (sends saved PNG on tick) ---
  - id: camera
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: test_static_image_sender.py
    inputs:
      tick: dora/timer/millis/90000
    outputs:
      - image
    env:
      IMAGE_PATH: "realsense_capture_720p.png"
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"

  # --- SAM3 text-prompted segmentation (GPU, autocast fp16) ---
  - id: sam3
    build: pip install -e ../../node-hub/dora-sam3
    path: dora-sam3
    inputs:
      image:
        source: camera/image
        queue_size: 1
      text: selector/sam3_text
    outputs:
      - masks
    env:
      SAM3_CONFIDENCE: "0.3"
      SAM3_FP16: "true"

  # --- Grasp selector (SAM3 mode: text → mask → candidates → VLM rate) ---
  - id: selector
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: grasp_selector.py
    inputs:
      image:
        source: camera/image
        queue_size: 1
      trigger: camera/image
      vlm_response: vlm/text
      mask: sam3/masks
    outputs:
      - vlm_request
      - grasp_result
      - sam3_text
    env:
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      TARGET_OBJECT: "the white handle"
      USE_THINK: "true"
      OUTPUT_DIR: "."
      DEFAULT_DEPTH_MM: "400"
      USE_SAM2: "false"
      USE_SAM3: "true"

  # --- VLM (thinking Q6_K — SAM3 fp16 frees enough VRAM) ---
  - id: vlm
    path: ../../target/release/dora-qwen-omni
    args: >-
      --model /home/champagne/models/qwen3-vl-a3b-thinking/Qwen3-VL-30B-A3B-Thinking-Q6_K.gguf
      --mmproj /home/champagne/models/qwen3-vl-a3b-thinking/mmproj-Qwen3VL-30B-A3B-Thinking-F16.gguf
      --prompt Output:
      -t 24
      --n-predict 8192
    inputs:
      text: selector/vlm_request
    outputs:
      - text

  # --- Visualizer ---
  - id: viz
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: test_visualize_grasp.py
    inputs:
      image:
        source: camera/image
        queue_size: 1
      vlm_response: selector/grasp_result
    env:
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      OUTPUT_DIR: "."
