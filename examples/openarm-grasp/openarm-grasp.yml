nodes:
  # --- Camera ---
  - id: camera
    build: pip install -e ../../node-hub/dora-pyrealsense
    path: dora-pyrealsense
    inputs:
      tick: dora/timer/millis/100  # 10Hz
    outputs:
      - image
      - depth
    env:
      DEVICE_SERIAL: "233522074606"
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      ENCODING: "rgb8"

  # --- VLM formatter (sends image+prompt on trigger) ---
  - id: vlm_formatter
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: grasp_vlm_formatter.py
    inputs:
      image:
        source: camera/image
        queue_size: 1
      trigger: planner/vlm_request
    outputs:
      - text
    env:
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      TARGET_OBJECT: "the red cube"

  # --- VLM (Qwen3-VL Thinking) ---
  - id: vlm
    path: ../../target/release/dora-qwen-omni
    args: >-
      --model /home/champagne/models/qwen3-vl-a3b-thinking/Qwen3-VL-30B-A3B-Thinking-Q6_K.gguf
      --mmproj /home/champagne/models/qwen3-vl-a3b-thinking/mmproj-F16.gguf
      --prompt Output:
      -t 24
      --n-predict 4096
    inputs:
      text: vlm_formatter/text
    outputs:
      - text

  # --- Grasp planner (state machine) ---
  - id: planner
    build: pip install numpy scipy dora-rs pyarrow
    path: grasp_planner.py
    inputs:
      tick: dora/timer/millis/200  # 5Hz state machine tick
      image:
        source: camera/image
        queue_size: 1
      depth:
        source: camera/depth
        queue_size: 1
      vlm_response: vlm/text
      joint_state: arm/joint_state
      user_feedback: terminal/text
    outputs:
      - grasp_pose
      - gripper_cmd
      - home_command
      - vlm_request
      - text
    env:
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      # Camera-to-robot transform: tx ty tz qw qx qy qz
      # Measure this manually: move EE to known point, identify in camera
      CAMERA_TRANSFORM: "0 0 0 1 0 0 0"
      APPROACH_HEIGHT: "0.10"
      LIFT_HEIGHT: "0.15"
      DATASET_PATH: "./grasp_dataset.jsonl"
      HOME_JOINTS: "0,0,0,0,0,0,0"

  # --- IK solver ---
  # Note: IK node outputs on the same ID as its input (event["id"]).
  # Input "grasp_pose" (xyzrpy) → output "grasp_pose" (jointstate).
  - id: ik
    build: pip install -e ../../node-hub/dora-pytorch-kinematics
    path: dora-pytorch-kinematics
    inputs:
      grasp_pose: planner/grasp_pose
    outputs:
      - grasp_pose
    env:
      URDF_PATH: "../openarm/openarm_v10.urdf"
      END_EFFECTOR_LINK: "openarm_left_link8"

  # --- Arm driver ---
  - id: arm
    build: pip install -e ../../node-hub/dora-openarm
    path: dora-openarm
    inputs:
      tick: dora/timer/millis/100  # 10Hz state query
      joint_command:
        source: ik/grasp_pose
        queue_size: 1
      home_command:
        source: planner/home_command
        queue_size: 1
      gripper_command: planner/gripper_cmd
    outputs:
      - joint_state
    env:
      CAN_INTERFACE: "can2"
      ARM_SIDE: "left"
      KP: "30"
      KD: "1"
      AUTO_ENABLE: "true"

  # --- Terminal input ---
  - id: terminal
    build: pip install -e ../../node-hub/terminal-input
    path: terminal-input
    outputs:
      - text
