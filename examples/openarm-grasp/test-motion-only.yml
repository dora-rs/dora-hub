nodes:
  # --- Camera (RealSense for depth data) ---
  - id: camera
    build: pip install -e ../../node-hub/dora-pyrealsense
    path: dora-pyrealsense
    inputs:
      tick: dora/timer/millis/200  # 5Hz — just need depth for the planner
    outputs:
      - image
      - depth
    env:
      DEVICE_SERIAL: "233522074606"
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      ENCODING: "rgb8"

  # --- Grasp Trigger (sends fixed grasp_result after warmup) ---
  - id: trigger
    build: pip install dora-rs pyarrow
    path: grasp_trigger.py
    inputs:
      depth:
        source: camera/depth
        queue_size: 1
    outputs:
      - grasp_result
    env:
      TARGET_GRASP: '{"p1": [469, 486], "p2": [547, 486]}'
      WARMUP_FRAMES: "5"

  # --- Motion Planner (CUDA) ---
  - id: motion_planner
    build: pip install -e ../../node-hub/dora-motion-planner
    path: dora-motion-planner
    inputs:
      depth:
        source: camera/depth
        queue_size: 1
      joint_state: arm/joint_state
      grasp_result: trigger/grasp_result
    outputs:
      - joint_trajectory
    env:
      URDF_PATH: "../openarm/openarm_v10.urdf"
      END_EFFECTOR_LINK: "openarm_left_hand_tcp"
      CAMERA_TRANSFORM: "-0.26 0.71 0.3 90 -45 0"
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      DOWNSAMPLE_STRIDE: "8"
      SAFETY_MARGIN: "0.02"
      NUM_WAYPOINTS: "40"
      NUM_SEEDS: "4"
      MAX_ITERS: "100"
      DEVICE: "cuda"
      GRASP_DEPTH_OFFSET: "-0.01"
      FLOOR_HEIGHT: "0.005"
      APPROACH_MARGIN: "0.03"

  # --- Trajectory Player ---
  - id: player
    build: pip install dora-rs numpy pyarrow
    path: ../openarm/trajectory_player.py
    inputs:
      joint_trajectory: motion_planner/joint_trajectory
      tick: dora/timer/millis/100
    outputs:
      - joint_command

  # --- Arm Driver (fake-can-server via xoq-can) ---
  - id: arm
    build: pip install -e ../../node-hub/dora-openarm
    path: dora-openarm
    inputs:
      tick: dora/timer/millis/100
      joint_command:
        source: player/joint_command
        queue_size: 1
    outputs:
      - joint_state
    env:
      CAN_INTERFACE: "537074820a4fb3b0b08fa321734736c44999c2aa20e754d51863f06582b089e7"
      ARM_SIDE: "left"
      KP: "30"
      KD: "1"
      AUTO_ENABLE: "true"
