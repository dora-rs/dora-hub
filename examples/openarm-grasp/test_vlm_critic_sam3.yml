nodes:
  # --- Camera (one frame every 90s — enough for SAM3 + VLM rating passes) ---
  - id: camera
    build: pip install -e ../../node-hub/dora-pyrealsense
    path: dora-pyrealsense
    inputs:
      tick: dora/timer/millis/90000
    outputs:
      - image
      - depth
    env:
      DEVICE_SERIAL: "233522074606"
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      ENCODING: "rgb8"

  # --- SAM3 text-prompted segmentation ---
  - id: sam3
    build: pip install -e ../../node-hub/dora-sam3
    path: dora-sam3
    inputs:
      image:
        source: camera/image
        queue_size: 1
      text: selector/sam3_text
    outputs:
      - masks
    env:
      SAM3_CONFIDENCE: "0.3"
      SAM3_FP16: "true"

  # --- Grasp selector (SAM3 mode: text → mask → candidates → VLM rate) ---
  - id: selector
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: grasp_selector.py
    inputs:
      image:
        source: camera/image
        queue_size: 1
      depth:
        source: camera/depth
        queue_size: 1
      trigger: camera/image
      vlm_response: vlm/text
      mask: sam3/masks
    outputs:
      - vlm_request
      - grasp_result
      - sam3_text
    env:
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      TARGET_OBJECT: "the white handle"
      USE_THINK: "true"
      OUTPUT_DIR: "."
      USE_SAM2: "false"
      USE_SAM3: "true"

  # --- VLM (thinking model for rating) ---
  - id: vlm
    path: ../../target/release/dora-qwen-omni
    args: >-
      --model /home/champagne/models/qwen3-vl-a3b-thinking/Qwen3-VL-30B-A3B-Thinking-Q6_K.gguf
      --mmproj /home/champagne/models/qwen3-vl-a3b-thinking/mmproj-Qwen3VL-30B-A3B-Thinking-F16.gguf
      --prompt Output:
      -t 24
      --n-predict 8192
    inputs:
      text: selector/vlm_request
    outputs:
      - text

  # --- Visualizer (draws grasp points from selector output) ---
  - id: viz
    build: pip install numpy opencv-python-headless dora-rs pyarrow
    path: test_visualize_grasp.py
    inputs:
      image:
        source: camera/image
        queue_size: 1
      vlm_response: selector/grasp_result
    env:
      IMAGE_WIDTH: "1280"
      IMAGE_HEIGHT: "720"
      OUTPUT_DIR: "."
